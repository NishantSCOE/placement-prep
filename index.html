<html lang="en">

<meta charset="UTF-8"/>

<title>Placement Prep Checklist</title>
<meta name="description" content="Automation & Robotics placement prep tracker for mechanical engineers"/>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Placement Prep&quot;,&quot;short_name&quot;:&quot;PlacementPrep&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#0f0f0f&quot;,&quot;theme_color&quot;:&quot;#0f0f0f&quot;,&quot;start_url&quot;:&quot;.&quot;}"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;--border2:#333;
  --text:#f0f0f0;--muted:#888;--muted2:#555;
  --green:#22c55e;--green-dim:#14532d;--green-bg:#052e16;
  --amber:#f59e0b;--amber-dim:#78350f;
  --blue:#60a5fa;--blue-dim:#1e3a5f;
  --red:#f87171;--red-dim:#7f1d1d;
  --purple:#a78bfa;--purple-dim:#3b0764;
  --teal:#2dd4bf;--teal-dim:#134e4a;
  --pink:#f472b6;--pink-dim:#831843;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px}
body{display:flex;flex-direction:column;min-height:100vh}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,15,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
}
.logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--green);letter-spacing:0.05em}
.logo span{color:var(--muted)}
.top-right{display:flex;align-items:center;gap:12px}
.pct-badge{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-dim);padding:4px 10px;border-radius:6px}
.reset-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.reset-btn:hover{color:var(--red);border-color:var(--red-dim)}

/* ── Progress bar ── */
.prog-wrap{height:3px;background:var(--border);position:sticky;top:56px;z-index:99}
.prog-fill{height:3px;background:linear-gradient(90deg,var(--green),var(--teal));transition:width 0.5s cubic-bezier(.4,0,.2,1)}

/* ── Layout ── */
.layout{display:flex;flex:1;min-height:0}
.sidebar{
  width:220px;flex-shrink:0;
  border-right:1px solid var(--border);
  padding:1.2rem 0;
  position:sticky;top:59px;height:calc(100vh - 59px);overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.nav-label{font-size:10px;letter-spacing:0.1em;color:var(--muted2);text-transform:uppercase;padding:0 1.2rem;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 1.2rem;cursor:pointer;
  border-left:2px solid transparent;
  transition:all 0.15s;font-size:13px;color:var(--muted);
}
.nav-item:hover{color:var(--text);background:var(--surface)}
.nav-item.active{color:var(--text);border-left-color:var(--accent, var(--green));background:var(--surface)}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent,var(--green));flex-shrink:0}
.nav-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted2)}
.nav-sep{height:1px;background:var(--border);margin:10px 1.2rem}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:2rem 2.5rem}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── Stats row ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-num{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:500}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em}
.stat-card.green .stat-num{color:var(--green)}
.stat-card.amber .stat-num{color:var(--amber)}
.stat-card.blue .stat-num{color:var(--blue)}
.stat-card.purple .stat-num{color:var(--purple)}

/* ── Category header ── */
.cat-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.cat-title{font-size:22px;font-weight:600}
.cat-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.cat-progress{font-size:13px;color:var(--muted);margin-left:auto}

/* ── Section ── */
.section{margin-bottom:2rem}
.sec-title{
  font-size:11px;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--muted2);font-family:'IBM Plex Mono',monospace;
  padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:10px;
}
.items{display:flex;flex-direction:column;gap:3px}

/* ── Item ── */
.item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  border:1px solid transparent;transition:all 0.12s;
}
.item:hover{background:var(--surface);border-color:var(--border)}
.item.done{opacity:0.55}
.item.done .item-text{text-decoration:line-through;color:var(--muted)}
.cb{
  width:18px;height:18px;border-radius:4px;
  border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.item.done .cb{border-color:var(--green);background:var(--green)}
.cb-check{display:none;color:#000;font-size:11px;font-weight:800;line-height:1}
.item.done .cb-check{display:block}
.item-text{font-size:14px;line-height:1.5;flex:1}
.badge{
  display:inline-block;font-size:10px;padding:2px 7px;
  border-radius:10px;margin-left:8px;vertical-align:middle;
  font-family:'IBM Plex Mono',monospace;white-space:nowrap;flex-shrink:0;margin-top:2px;
}
.b-h{background:#052e16;color:#4ade80;border:1px solid #14532d}
.b-m{background:#451a03;color:#fbbf24;border:1px solid #78350f}
.b-l{background:#0c1a2e;color:#93c5fd;border:1px solid #1e3a5f}

/* ── Cat hidden ── */
.cat-view{display:none}
.cat-view.active{display:block}

/* ── Empty state ── */
.done-state{text-align:center;padding:3rem;color:var(--muted)}
.done-state .big{font-size:40px;margin-bottom:12px}
.done-state p{font-size:15px}

/* ── Mobile ── */
.mob-tabs{display:none}
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:1rem}
  .stats{grid-template-columns:repeat(2,1fr)}
  .mob-tabs{
    display:flex;overflow-x:auto;gap:6px;
    padding:10px 1rem;border-bottom:1px solid var(--border);
    position:sticky;top:59px;z-index:98;background:var(--bg);
  }
  .mob-tabs::-webkit-scrollbar{display:none}
  .mob-tab{
    flex-shrink:0;padding:6px 14px;border-radius:20px;
    font-size:12px;cursor:pointer;border:1px solid var(--border2);
    background:var(--surface);color:var(--muted);white-space:nowrap;
    font-family:'Inter',sans-serif;
  }
  .mob-tab.active{background:var(--green-bg);border-color:var(--green-dim);color:var(--green)}
  .topbar{padding:0 1rem}
}

/* ── Scrollbar global ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<div class="topbar">

        {t:'Eliminate filler words — um, like, basically, actually, you know',p:'h'},
        {t:'Read English newspapers or articles aloud — 10 min/day',p:'m'},
      ]},
      {title:'Interview Communication', items:[
        {t:'Prepare a strong 2-minute self-introduction — memorize and practice it',p:'h'},
        {t:'STAR method — Situation, Task, Action, Result for HR behavioral questions',p:'h'},
        {t:'Practice explaining your projects simply in 2-3 sentences each',p:'h'},
        {t:'Know why you want THIS specific company and THIS specific role',p:'h'},
        {t:'Practice mock interviews — with friends, camera, or mirror',p:'h'},
        {t:'Prepare answers for top 20 HR questions (tell me about yourself, strengths, etc.)',p:'h'},
      ]},
      {title:'Technical Communication', items:[
        {t:'Explain what PID control is to a non-engineer in 1 minute — practice this',p:'h'},
        {t:'Explain what SCADA does in 3 sentences — practice this',p:'h'},
        {t:'Explain your best project clearly: problem, approach, result',p:'h'},
        {t:'Write a clean LinkedIn summary about your skills and projects',p:'m'},
        {t:'Build a GitHub profile with proper project READMEs',p:'h'},
      ]},
      {title:'Written Communication', items:[
        {t:'Professional email format — subject, greeting, body, sign-off',p:'m'},
        {t:'Resume — 1 page, clean, ATS-friendly format, no photo needed',p:'h'},
        {t:'Resume action verbs — built, designed, simulated, automated, analyzed',p:'h'},
        {t:'Cover letter basics for automation and robotics roles',p:'m'},
      ]},
      {title:'Group Discussion and Soft Skills', items:[
        {t:'GD practice — how to initiate, contribute, and summarize well',p:'m'},
        {t:'Body language — eye contact, upright posture, confident handshake',p:'h'},
        {t:'Listening skills — do not interrupt, acknowledge others points',p:'h'},
        {t:'Mock stress interview practice — stay calm under pressure questions',p:'h'},
      ]},
    ]
  },
];

const STORAGE_KEY = 'placement_checklist_v1';
let checked = {};
let activeCat = CATS[0].id;

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); }
function load(){
  try{ const d = localStorage.getItem(STORAGE_KEY); if(d) checked = JSON.parse(d); }
  catch(e){ checked = {}; }
}
function resetAll(){
  if(!confirm('Reset ALL progress? This cannot be undone.')) return;
  checked = {}; save(); renderAll();
}
function totalItems(){ return CATS.reduce((a,c)=>a+c.sections.reduce((b,s)=>b+s.items.length,0),0); }
function doneItems(){ return Object.values(checked).filter(Boolean).length; }
function catDone(cat){ return cat.sections.reduce((a,s)=>a+s.items.filter((_,i)=>checked[cat.id+'__'+s.title+'__'+i]).length,0); }
function catTotal(cat){ return cat.sections.reduce((a,s)=>a+s.items.length,0); }

function updateStats(){
  const total=totalItems(), done=doneItems(), left=total-done, pct=total?Math.round(done/total*100):0;
  document.getElementById('sDone').textContent=done;
  document.getElementById('sLeft').textContent=left;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sPct').textContent=pct+'%';
  document.getElementById('topPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='<div class="nav-label">Categories</div>';
  CATS.forEach(cat=>{
    const done=catDone(cat), total=catTotal(cat);
    const el=document.createElement('div');
    el.className='nav-item'+(cat.id===activeCat?' active':'');
    el.style.setProperty('--accent', cat.color);
    el.innerHTML=`<div class="nav-dot" style="background:${cat.color}"></div><span>${cat.label}</span><span class="nav-count">${done}/${total}</span>`;
    el.onclick=()=>{ activeCat=cat.id; renderSidebar(); renderMobTabs(); showCat(cat.id); };
    sb.appendChild(el);
  });
}

function renderMobTabs(){
  const wrap=document.getElementById('mobTabs');
  wrap.innerHTML='';
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='mob-tab'+(cat.id===activeCat?' active':'');
    btn.textContent=cat.label;
    btn.onclick=()=>{ activeCat=cat.id; renderSidebar(); renderMobTabs(); showCat(cat.id); };
    wrap.appendChild(btn);
  });
}

function showCat(id){
  document.querySelectorAll('.cat-view').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('view-'+id);
  if(el) el.classList.add('active');
  window.scrollTo(0,0);
}

function renderCatViews(){
  const container=document.getElementById('catViews');
  container.innerHTML='';
  CATS.forEach(cat=>{
    const view=document.createElement('div');
    view.className='cat-view'+(cat.id===activeCat?' active':'');
    view.id='view-'+cat.id;

    const header=document.createElement('div');
    header.className='cat-header';
    const done=catDone(cat), total=catTotal(cat);
    header.innerHTML=`
      <div class="cat-title" style="color:${cat.color}">${cat.label}</div>
      <div class="cat-pill" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44">${done}/${total} done</div>
    `;
    view.appendChild(header);

    cat.sections.forEach(sec=>{
      const secEl=document.createElement('div');
      secEl.className='section';
      secEl.innerHTML=`<div class="sec-title">${sec.title}</div>`;
      const itemsEl=document.createElement('div');
      itemsEl.className='items';
      sec.items.forEach((item,i)=>{
        const key=cat.id+'__'+sec.title+'__'+i;
        const row=document.createElement('div');
        row.className='item'+(checked[key]?' done':'');
        const bClass=item.p==='h'?'b-h':item.p==='m'?'b-m':'b-l';
        const bText=item.p==='h'?'must know':item.p==='m'?'should know':'good to know';
        row.innerHTML=`<div class="cb"><span class="cb-check">✓</span></div><span class="item-text">${item.t}<span class="badge ${bClass}">${bText}</span></span>`;
        row.onclick=()=>{
          checked[key]=!checked[key];
          row.classList.toggle('done');
          save(); updateStats(); renderSidebar(); renderMobTabs();
          const hdr=document.getElementById('hdr-'+cat.id);
          if(hdr){ const d2=catDone(cat),t2=catTotal(cat); hdr.querySelector('.cat-pill').textContent=d2+'/'+t2+' done'; }
        };
        itemsEl.appendChild(row);
      });
      secEl.appendChild(itemsEl);
      view.appendChild(secEl);
    });
    container.appendChild(view);
  });
}

function renderAll(){
  renderSidebar();
  renderMobTabs();
  renderCatViews();
  updateStats();
}

load();
renderAll();
</script>
</body>
</html>
